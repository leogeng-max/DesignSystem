<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mogo Design System — Intelligent Investing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET ===== */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #0A0A0A;
      color: #E3E2E2;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    a { color: inherit; text-decoration: none; }
    pre, code { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }

    /* ===== APP CHROME ===== */
    .app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background:
        radial-gradient(1200px 800px at 20% 0%, #15171A 0%, transparent 60%),
        radial-gradient(900px 600px at 100% 100%, #111315 0%, transparent 60%),
        #0A0A0A;
    }

    .topbar {
      height: 56px;
      padding: 0 16px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 50;
      flex-shrink: 0;
    }
    .hamburger {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 0;
      transition: background 120ms ease;
    }
    .hamburger:hover { background: rgba(255,255,255,0.04); }
    .hamburger svg { width: 18px; height: 18px; stroke: #E3E2E2; }
    .topbar-title {
      font-size: 13px; font-weight: 500; letter-spacing: -0.02em;
      color: #C7C7C7;
    }
    .topbar-meta {
      margin-left: auto;
      font-size: 11px; color: #565B5E; letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ===== STAGE (where frame or full-width docs live) ===== */
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .stage[data-mode="frame"] .stage-frame { display: flex; }
    .stage[data-mode="frame"] .stage-docs { display: none; }
    .stage[data-mode="docs"] .stage-frame { display: none; }
    .stage[data-mode="docs"] .stage-docs { display: block; }

    /* ===== FRAME MODE ===== */
    .stage-frame {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 32px;
      gap: 14px;
    }
    .frame-label {
      flex-shrink: 0;
      font-size: 11px; color: #565B5E;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .frame-page-title {
      flex-shrink: 0;
      font-size: 13px; color: #929292;
      letter-spacing: -0.02em;
      text-align: center;
      max-width: 80vw;
      min-height: 36px;
    }
    .frame-page-title small { display: block; color: #565B5E; font-size: 11px; margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }

    /* Device wrap takes the SCALED visual size so flex layout reserves the right space */
    .device-wrap {
      position: relative;
      width: calc(393px * var(--device-scale, 1));
      height: calc(852px * var(--device-scale, 1));
      flex-shrink: 0;
    }
    /* iPhone 16 frame: 393×852 inner with subtle chrome */
    .device {
      position: absolute;
      top: 0; left: 0;
      width: 393px; height: 852px;
      transform: scale(var(--device-scale, 1));
      transform-origin: top left;
      background: #000000;
      border-radius: 50px;
      box-shadow:
        0 0 0 8px #1A1C1F,
        0 0 0 9px #2A2C2F,
        0 40px 100px -20px rgba(0,0,0,0.8),
        0 0 80px -20px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .device-screen {
      position: absolute; inset: 0;
      background: #000000;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;          /* Firefox */
      -ms-overflow-style: none;       /* IE / Edge */
    }
    .device-screen::-webkit-scrollbar { width: 0; height: 0; display: none; }  /* WebKit */
    .device-island {
      position: absolute;
      top: 11px; left: 50%; transform: translateX(-50%);
      width: 124px; height: 36px;
      background: #000000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .device-home {
      position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: #FFFFFF;
      border-radius: 3px;
      z-index: 10;
      pointer-events: none;
      opacity: 0.95;
    }

    /* ===== DOCS MODE (full-width tooling) ===== */
    .stage-docs {
      width: 100%; height: 100%;
      overflow-y: auto;
      padding: 48px clamp(20px, 5vw, 80px);
    }
    .docs-inner { max-width: 980px; margin: 0 auto; }
    .docs-h1 {
      font-size: 32px; font-weight: 400; letter-spacing: -0.04em;
      color: #FFFFFF;
      margin-bottom: 8px;
    }
    .docs-lead {
      font-size: 15px; color: #929292; max-width: 640px;
      letter-spacing: -0.01em; line-height: 1.5;
      margin-bottom: 40px;
    }
    .docs-section { margin-bottom: 48px; }
    .docs-section h2 {
      font-size: 18px; font-weight: 500; color: #E3E2E2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .docs-section p { font-size: 14px; color: #929292; line-height: 1.5; margin-bottom: 16px; }

    .codeblock {
      background: #111315;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0;
      padding: 0;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .codeblock-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: #0E1012;
    }
    .codeblock-head .lang {
      font-size: 11px; color: #929292;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .codeblock-head .copy-btn {
      font-size: 11px; color: #C7C7C7;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: background 120ms ease;
    }
    .codeblock-head .copy-btn:hover { background: rgba(255,255,255,0.04); }
    .codeblock-head .copy-btn.copied { color: #FFFFFF; border-color: #FFFFFF; }
    .codeblock pre {
      padding: 14px;
      overflow-x: auto;
      font-size: 12.5px;
      line-height: 1.55;
      color: #C7C7C7;
    }
    .codeblock pre code .k { color: #929292; }
    .codeblock pre code .s { color: #E3E2E2; }
    .codeblock pre code .c { color: #565B5E; font-style: italic; }

    /* ===== DRAWER ===== */
    .drawer-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
      z-index: 90;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; bottom: 0; left: 0;
      width: min(360px, 90vw);
      background: #0E1012;
      border-right: 1px solid rgba(255,255,255,0.06);
      transform: translateX(-100%);
      transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 100;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .drawer-head .title {
      font-size: 13px; color: #C7C7C7; letter-spacing: -0.02em;
    }
    .drawer-head .close {
      width: 32px; height: 32px;
      display: grid; place-items: center;
    }
    .drawer-head .close svg { width: 14px; height: 14px; stroke: #929292; }
    .drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 24px;
    }
    .drawer-group-label {
      padding: 16px 24px 8px;
      font-size: 10px; color: #565B5E;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .drawer-item {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
      padding: 12px 24px;
      font-size: 14px; color: #C7C7C7;
      letter-spacing: -0.01em;
      transition: background 120ms ease, color 120ms ease;
      text-align: left;
    }
    .drawer-item:hover { background: rgba(255,255,255,0.03); color: #FFFFFF; }
    .drawer-item.active { color: #FFFFFF; background: rgba(255,255,255,0.04); }
    .drawer-item .arrow { color: #565B5E; font-size: 12px; }

    /* ===== IN-FRAME COMPONENTS (mobile) ===== */
    .m {
      font-family: 'Inter', sans-serif;
      color: #E3E2E2;
    }
    /* Mobile top bar */
    .m-topbar {
      height: 88px;
      padding: 44px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .m-topbar .back { width: 24px; height: 24px; display: grid; place-items: center; }
    .m-topbar .back svg { width: 12px; height: 12px; stroke: #FFFFFF; stroke-width: 1.5; fill: none; }
    .m-topbar .right { font-size: 15px; font-weight: 400; letter-spacing: -0.02em; color: #C7C7C7; }

    /* Page padding */
    .m-page { padding: 0 20px; }

    /* Titles */
    .m-h1 { font-size: 22px; font-weight: 400; line-height: 1.18; letter-spacing: -0.06em; color: #FFFFFF; }
    .m-h2 { font-size: 18px; font-weight: 400; line-height: 1.2; letter-spacing: -0.02em; color: #FFFFFF; }
    .m-typing-xl { font-size: 17px; font-weight: 500; line-height: 1.32; letter-spacing: -0.02em; }
    .m-typing-lg { font-size: 15px; font-weight: 500; line-height: 1.32; letter-spacing: -0.02em; }
    .m-typing-md { font-size: 14px; font-weight: 500; line-height: 1.32; letter-spacing: -0.02em; }
    .m-typing-sm { font-size: 13px; font-weight: 500; line-height: 1.32; letter-spacing: -0.02em; }
    .m-body-xl { font-size: 17px; font-weight: 400; line-height: 1.32; letter-spacing: -0.02em; }
    .m-body-lg { font-size: 15px; font-weight: 400; line-height: 1.32; letter-spacing: -0.02em; }
    .m-body-md { font-size: 14px; font-weight: 400; line-height: 1.32; letter-spacing: -0.02em; }
    .m-body-sm { font-size: 13px; font-weight: 400; line-height: 1.32; letter-spacing: -0.02em; }
    .m-body-xs { font-size: 11px; font-weight: 400; line-height: 1.32; letter-spacing: -0.02em; }
    .m-cta { font-size: 15px; font-weight: 400; line-height: 1.32; letter-spacing: -0.02em; }
    .m-money-xxl { font-size: 40px; font-weight: 300; line-height: 1; letter-spacing: -0.06em; }
    .m-money-xl { font-size: 28px; font-weight: 300; line-height: 1; letter-spacing: -0.06em; }
    .m-money-lg { font-size: 22px; font-weight: 300; line-height: 1; letter-spacing: -0.06em; }
    .m-money-md { font-size: 18px; font-weight: 400; line-height: 1; }
    .m-money-sm { font-size: 15px; font-weight: 400; line-height: 1; }
    .m-money-xs { font-size: 13px; font-weight: 400; line-height: 1; }

    .m-muted { color: #929292; }
    .m-dim { color: #565B5E; }

    /* List rows */
    .m-row {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .m-row:last-child { border-bottom: none; }
    .m-row .label { flex: 1; font-size: 14px; }
    .m-row .value { font-size: 14px; color: #FFFFFF; }
    .m-row .arrow { color: #565B5E; font-size: 14px; }

    /* Two-column data row */
    .m-data {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .m-data .lbl { font-size: 14px; color: #929292; }
    .m-data .val { font-size: 14px; color: #FFFFFF; text-align: right; }

    /* Radio row */
    .m-radio {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 16px 0;
    }
    .m-radio .label-block .label { font-size: 15px; color: #FFFFFF; }
    .m-radio .label-block .desc { font-size: 13px; color: #929292; margin-top: 4px; }
    .m-radio .indicator {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1px solid #565B5E;
      flex-shrink: 0;
    }
    .m-radio.selected .indicator {
      background: #FFFFFF; border-color: #FFFFFF;
      box-shadow: inset 0 0 0 4px #000000, inset 0 0 0 5px #FFFFFF;
    }

    /* Inline yes/no */
    .m-inline-yn {
      display: flex; gap: 24px;
      padding: 8px 0;
    }
    .m-inline-yn .opt { font-size: 15px; color: #565B5E; letter-spacing: -0.02em; }
    .m-inline-yn .opt.selected { color: #FFFFFF; font-weight: 500; }

    /* OTP */
    .m-otp { display: flex; gap: 16px; }
    .m-otp .cell {
      width: 32px; padding: 8px 0;
      text-align: center;
      font-size: 17px; color: #FFFFFF;
      border-bottom: 1px solid #FFFFFF;
    }

    /* Big number */
    .m-bignum { display: flex; align-items: baseline; justify-content: flex-end; gap: 8px; padding: 8px 0; }
    .m-bignum .amt { color: #FFFFFF; }
    .m-bignum .ccy { color: #565B5E; font-size: 18px; letter-spacing: 0; }

    /* Numeric keypad (dark) */
    .m-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; background: #000000; }
    .m-keypad .key {
      height: 44px; background: #1C1C1C;
      display: grid; place-items: center;
      font-size: 20px; color: #FFFFFF;
      letter-spacing: -0.02em;
    }
    .m-keypad .key.muted { background: transparent; color: #929292; }

    /* Slider */
    .m-slider { padding: 12px 0 4px; }
    .m-slider .track {
      height: 2px; background: #565B5E;
      position: relative;
    }
    .m-slider .fill { position: absolute; left: 0; top: 0; bottom: 0; background: #FFFFFF; }
    .m-slider .thumb {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 14px; height: 14px; border-radius: 50%; background: #FFFFFF;
    }
    .m-slider .ends {
      display: flex; justify-content: space-between;
      margin-top: 12px;
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: #C7C7C7;
    }

    /* Bottom CTAs */
    .m-cta-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px;
      gap: 16px;
    }
    .m-cta-text {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 15px; color: #FFFFFF;
    }
    .m-cta-text.dim { color: #565B5E; }
    .m-cta-text .arrow { font-size: 14px; }

    /* Large primary button — full-bleed, 393 × 99 (matches Figma spec) */
    .m-lpb {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 99px;
      background: #1C1C1C;
      color: #FFFFFF;
      font-size: 15px; letter-spacing: -0.02em;
      text-align: center;
      border-radius: 0;
    }
    /* When the LPB is rendered inside an m-page (which has 20px horizontal padding),
       use this class to escape the padding so the button reaches the screen edges. */
    .m-lpb.full-bleed {
      margin-left: -20px;
      margin-right: -20px;
      width: calc(100% + 40px);
    }

    /* Screen layout helper — bottom-anchored CTAs.
       Wrap a screen's content in .m-screen-flex; the .m-screen-body grows
       to fill space and .m-screen-bottom sticks to the bottom of the viewport. */
    .m-screen-flex {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .m-screen-flex .m-screen-body { flex: 1 1 auto; }
    .m-screen-flex .m-screen-bottom { flex-shrink: 0; }
    .m-screen-flex .m-screen-bottom .m-cta-row { padding: 20px; }

    /* Bottom sheet (decorative on docs pages) */
    .m-sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: #1C1C1C;
      padding: 20px 20px 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* ===== MODALS =====
       Surface is one step lighter than page (#1C1C1C on #000000).
       Full screen width, edge-to-edge — no horizontal margin from screen edges.
       X close in top-right. When an LPB sits inside a modal it goes one more step lighter (#232627). */
    .m-modal {
      position: relative;
      background: #1C1C1C;
      overflow: hidden;
    }
    .m-modal-body-wrap { padding: 20px; }
    .m-modal-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 24px; height: 24px;
      display: grid; place-items: center;
      font-size: 18px; color: #929292;
      z-index: 2;
    }
    .m-modal-title {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      padding-right: 32px;
    }
    .m-modal-text {
      font-size: 14px;
      color: #929292;
      line-height: 1.5;
      margin-top: 12px;
    }
    .m-modal .m-lpb {
      background: #232627;        /* elevated 2 steps from page — lighter than modal surface */
    }
    .m-modal-arrow {
      display: flex; justify-content: flex-end;
      padding: 24px 20px 20px;
    }
    .m-modal-arrow .arrow {
      font-size: 22px; color: #FFFFFF; line-height: 1;
    }

    /* ===== INTRO BLOCK (welcome page in frame) ===== */
    .intro-eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #565B5E; }
    .intro-title { font-size: 22px; font-weight: 400; letter-spacing: -0.04em; color: #FFFFFF; line-height: 1.18; }
    .intro-body { font-size: 14px; line-height: 1.55; color: #929292; letter-spacing: -0.01em; }

    /* ===== SWATCH GRID (rendered into mobile frame) ===== */
    .swatch {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .swatch .meta { display: flex; align-items: center; gap: 12px; }
    .swatch .chip {
      width: 28px; height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .swatch .name { font-size: 14px; color: #FFFFFF; }
    .swatch .desc { font-size: 11px; color: #565B5E; margin-top: 2px; }
    .swatch .hex { font-size: 12px; color: #929292; font-family: ui-monospace, monospace; }

    /* ===== TYPE ROW ===== */
    .type-row {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .type-row .info {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 8px;
    }
    .type-row .info .name { font-size: 11px; color: #565B5E; letter-spacing: 0.08em; text-transform: uppercase; }
    .type-row .info .spec { font-size: 11px; color: #565B5E; font-family: ui-monospace, monospace; }

    /* ===== SPACING VISUAL ===== */
    .space-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .space-row .name { font-size: 13px; color: #FFFFFF; width: 48px; font-family: ui-monospace, monospace; }
    .space-row .bar { background: #FFFFFF; height: 6px; flex-shrink: 0; }
    .space-row .px { font-size: 11px; color: #565B5E; margin-left: auto; font-family: ui-monospace, monospace; }

    /* ===== UTILITIES ===== */
    .pad-h-20 { padding-left: 20px; padding-right: 20px; }
    .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; } .mt-32 { margin-top: 32px; } .mt-40 { margin-top: 40px; } .mt-48 { margin-top: 48px; } .mt-64 { margin-top: 64px; }
    .gap-32 > * + * { margin-top: 32px; }
    .right { text-align: right; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
      <span class="topbar-title">Mogo Design System — Intelligent Investing</span>
      <span class="topbar-meta" id="page-meta"></span>
    </header>

    <main class="stage" id="stage" data-mode="frame">
      <div class="stage-frame">
        <span class="frame-label">iPhone 16 · 393 × 852</span>
        <div class="device-wrap">
          <div class="device" id="device">
            <div class="device-island"></div>
            <div class="device-screen" id="screen"></div>
            <div class="device-home"></div>
          </div>
        </div>

        else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'html') node.innerHTML = v;
        else node.setAttribute(k, v);
      });
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return node;

    function buildTopBar(leftLabel, rightLabel) {

    function sectionTitle(text, marginTop = 0) {
      const e = el('div', { class: 'm-h2', style: `color: #FFFFFF; ${marginTop ? 'margin-top: ' + marginTop + 'px;' : ''}` }, text);
      return e;
    }

      return el('div', { class: 'm-body-sm', style: 'margin-top: 8px; color: #929292; line-height: 1.55;' }, text);
    }
    function radioRow(label, desc, selected) {
      return el('div', { class: 'm-radio' + (selected ? ' selected' : '') }, [
        el('div', { class: 'label-block' }, [
          el('div', { class: 'label' }, label),

        ]),

      ]);

    function useAvoid(useLabel, useText, avoidLabel, avoidText) {

        el('div', { class: 'm-body-sm', style: 'color: #565B5E; margin-top: 4px;' }, avoidLabel + ': ' + avoidText)
      ]);
    }
    function codeBlock(lang, code) {
      const block = el('div', { class: 'codeblock' });
      const head = el('div', { class: 'codeblock-head' });
      head.appendChild(el('span', { class: 'lang' }, lang));
      const btn = el('button', { class: 'copy-btn' }, 'Copy');
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
        });
      });
      head.appendChild(btn);
      block.appendChild(head);
      const pre = el('pre');
      const codeEl = el('code');
      codeEl.textContent = code;
      pre.appendChild(codeEl);
      block.appendChild(pre);
      return block;
    }

    /* =========================================================
       CODE GENERATORS
       ========================================================= */
    function kebab(s) { return s.replace(/([a-z])([A-Z])/g, '$1-$2').replace(/_/g, '-').toLowerCase(); }

    function generateCSS() {
      const lines = ['/* Mogo Design System — Intelligent Investing */', '/* Auto-generated from token source-of-truth */', '', ':root {'];
      lines.push('  /* Colors */');
      Object.entries(TOKENS.colors).forEach(([k, c]) => {
        lines.push(`  --color-${kebab(k)}: ${c.value};`);
      });
      lines.push('', '  /* Typography */');
      lines.push(`  --font-family: '${TOKENS.typography.fontFamily}', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;`);
      Object.entries(TOKENS.typography.scale).forEach(([k, t]) => {
        lines.push(`  --font-size-${kebab(k)}: ${t.size}px;`);
      });
      lines.push('', '  /* Spacing */');
      Object.entries(TOKENS.spacing).forEach(([k, v]) => {
        lines.push(`  --space-${k}: ${v}px;`);
      });
      lines.push('', '  /* Radii */');
      Object.entries(TOKENS.radii).forEach(([k, v]) => {
        lines.push(`  --radius-${kebab(k)}: ${v}px;`);
      });
      lines.push('}');
      return lines.join('\n');
    }

    function generateTailwind() {
      const colors = {}, spacing = {}, fontSize = {};
      Object.entries(TOKENS.colors).forEach(([k, c]) => colors[kebab(k)] = c.value);
      Object.entries(TOKENS.spacing).forEach(([k, v]) => spacing[k] = `${v}px`);
      Object.entries(TOKENS.typography.scale).forEach(([k, t]) => {
        fontSize[kebab(k)] = [`${t.size}px`, { lineHeight: t.lineHeight, letterSpacing: t.tracking, fontWeight: t.weight }];
      });
      const cfg = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', '-apple-system', 'system-ui', 'sans-serif'] },
            colors,
            spacing,
            borderRadius: { DEFAULT: '0px' },
            fontSize
          }
        }
      };
      return '/** @type {import("tailwindcss").Config} */\nmodule.exports = ' + JSON.stringify(cfg, null, 2) + ';';
    }

    function generateTS() {
      return 'export const tokens = ' + JSON.stringify(TOKENS, null, 2) + ' as const;\n\nexport type Tokens = typeof tokens;';
    }

    function generateSCSS() {
      const lines = ['// Mogo Design System — Intelligent Investing', '// Auto-generated from token source-of-truth', ''];
      lines.push('// Colors');
      Object.entries(TOKENS.colors).forEach(([k, c]) => lines.push(`$color-${kebab(k)}: ${c.value};`));
      lines.push('', '// Typography');
      lines.push(`$font-family: '${TOKENS.typography.fontFamily}', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;`);
      Object.entries(TOKENS.typography.scale).forEach(([k, t]) => lines.push(`$font-size-${kebab(k)}: ${t.size}px;`));
      lines.push('', '// Spacing');
      Object.entries(TOKENS.spacing).forEach(([k, v]) => lines.push(`$space-${k}: ${v}px;`));
      return lines.join('\n');
    }

    function generateJSON() {
      // W3C-ish design tokens format
      const out = { $description: TOKENS.meta.name, $version: TOKENS.meta.version, color: {}, typography: {}, spacing: {}, radius: {} };
      Object.entries(TOKENS.colors).forEach(([k, c]) => { out.color[k] = { $value: c.value, $type: 'color', $description: c.desc || '' }; });
      Object.entries(TOKENS.typography.scale).forEach(([k, t]) => {
        out.typography[k] = {
          $type: 'typography',
          $value: { fontFamily: TOKENS.typography.fontFamily, fontSize: `${t.size}px`, fontWeight: t.weight, lineHeight: t.lineHeight, letterSpacing: t.tracking },
          $description: t.label
        };
      });
      Object.entries(TOKENS.spacing).forEach(([k, v]) => { out.spacing[k] = { $value: `${v}px`, $type: 'dimension' }; });
      Object.entries(TOKENS.radii).forEach(([k, v]) => { out.radius[k] = { $value: `${v}px`, $type: 'dimension' }; });
      out.meta = { philosophy: TOKENS.philosophy.body, ctaSystem: TOKENS.ctaSystem, copyPrinciples: TOKENS.copyPrinciples };
      return JSON.stringify(out, null, 2);
    }

    function generateLongPrompt() {
      return `You are designing for Mogo Intelligent Investing. Read these constraints before producing any output.

PHILOSOPHY
${TOKENS.philosophy.body}

VISUAL SYSTEM
- Theme: dark only. Page background is pure black (#000000).
- Surfaces elevate by getting LIGHTER, not by adding shadow. Step 1 elevation = #1C1C1C.
- No shadows. No gradients. No decorative color. No rounded corners (radius = 0).
- Type family: Inter only. Use the type ramp below — do not invent new sizes.
- Monochrome only. No accent or brand color appears in the UI.
- Scrollbars are NEVER visible on mobile screens. Content scrolls vertically when needed, but the scrollbar itself is hidden (matches native iOS behavior). In CSS: scrollbar-width: none; -ms-overflow-style: none; ::-webkit-scrollbar { display: none; }.

COLOR PALETTE (dark mode)
${Object.entries(TOKENS.colors).map(([k, c]) => `  ${c.value}  ${c.name.padEnd(16)} ${c.desc || ''}`).join('\n')}

TYPE RAMP (Inter, sizes in px)
${Object.entries(TOKENS.typography.scale).map(([k, t]) => `  ${t.label.padEnd(28)} ${String(t.size).padStart(3)}px / ${String(t.weight).padStart(3)} / lh ${t.lineHeight} / track ${t.tracking}`).join('\n')}

SPACING (4px base, only these values)
${Object.entries(TOKENS.spacing).map(([k, v]) => `  ${k.padEnd(4)} = ${v}px`).join('\n')}

SCREEN LAYOUT ANATOMY (mandatory for every screen)
Every screen is a flex column with three vertical zones:

  ┌─────────────────────────────────┐
  │  TOP BAR (88px)                 │  Back chevron left, optional secondary action right, hairline divider
  ├─────────────────────────────────┤
  │  BODY (flex: 1, scrollable)     │  Title, content, lists, forms — grows to fill available space
  │                                 │
  │                                 │
  ├─────────────────────────────────┤
  │  BOTTOM ZONE (flex-shrink: 0)   │  Sticky to the bottom edge, holds CTAs and/or keypad
  └─────────────────────────────────┘

CTA POSITIONING
ALL CTAs anchor to the BOTTOM of the screen. They never float in the middle of content. Even if the body content is short and creates empty space, that empty space lives in the body, not below the CTA.

Stacking order at the bottom (top → bottom of the bottom zone):
1. Navigational CTAs (text + arrow, optional, can be left- or right-aligned, padding 20px)
2. Decision pair (Cancel left, Proceed right) — when this pattern applies, it occupies the bottom zone alone
3. Large Primary Button (LPB) — always the absolute lowest element when present, edge-to-edge full-width × 99px tall
4. Numeric keypad — when present, sits below other CTAs; the LPB does not appear on screens with a keypad

When the bottom zone contains both a navigational CTA and an LPB (e.g., "Open a Different Account" + "Activate Core Portfolio"), the navigational CTA goes first (above) and the LPB sits at the very bottom edge of the screen.

CTA SYSTEM
CTAs are classified by intent, not size or visual style.
- Decision (irreversible): bottom-anchored, Cancel + Proceed text-with-arrow, equal weight, no filled buttons.
- Navigational (low-risk): text + arrow, full row including whitespace is the tap target. Left- or right-aligned at the bottom of the screen, no hierarchy.
- Finalization (closure only): Large Primary Button. Single CTA. Forbidden anywhere "Cancel" is a valid outcome.
  Dimensions: 393 × 99 — full screen width (edge-to-edge, no horizontal page padding) × 99px tall. Text vertically and horizontally centered.
  Background: #1C1C1C (slightly lighter than the #000000 page). No border, no shadow, no rounded corners.
  Position: ALWAYS at the very bottom edge of the screen. Never mid-page.
  When rendered inside a padded page container, the button must escape that padding to reach the screen edges (use negative horizontal margin or render outside the padded container).
${TOKENS.ctaSystem.global}

MODALS
Modals are surfaces elevated one step above the page (#1C1C1C on a #000000 page). They span the full screen width — edge-to-edge, no horizontal margin from the screen edges, just like the Large Primary Button. Three approved patterns:

1. Info modal (no action). Title (H2) + body (Body / MD, color #929292) + X close in top-right. The X is the only way to dismiss. Used for short context, status, or recognition.
2. Info modal with Large Primary Button. Same as above plus an LPB at the bottom. Inside a modal the LPB elevates one more step (background #232627 instead of #1C1C1C) so it remains visually distinct from the modal surface. The LPB still spans the modal full-bleed.
3. Decision modal (with options). Title + body + form (radios, inputs) + a single right-arrow CTA in the bottom-right of the modal. The X serves as Cancel; the arrow advances. Used when the modal itself frames a discrete decision.

Modal rules:
- Internal padding: 20px on all sides.
- X close: top-right of the modal, 16px from edges, color #929292.
- Title: H2 weight, #FFFFFF, with right padding so it does not overlap the X.
- Body: 12px below title, color #929292, line-height 1.5.
- No backdrop tinting beyond the standard page dim — keep the modal calm, not loud.
- Never use modals for marketing, persuasion, or "are you sure?" interruption. Modals carry information or one decision.

COPY RULES
${TOKENS.copyPrinciples.coreRule}
- Past events: use "Submitted at, Executed at, Expired at, Cancelled at". Do NOT use "Submitted, Expired, Cancelled" alone.
- Future condition: use "Expires" only. Do NOT use "Expires at" or "Expiration" for future.
- Price terminology: intent (Limit Price, Stop Price) for user input; outcome (Price, Total Cost, Total Proceeds) after execution. Never mix.

PROTOTYPE CONTAINER (mandatory shell for every prototype you build)
Every prototype must live inside the same desktop container the design system viewer uses. Do not produce loose mobile screens floating on a white page.

- Background: dark base #0A0A0A with subtle radial gradients in the corners (matches the design system viewer). No bright surfaces, no decorative imagery.
- Top-left: a hamburger menu button. No other top-bar controls except an optional title and metadata in the corner.
- Drawer (opens from the left when hamburger is clicked): vertical list of every screen/page in the prototype, grouped by section (e.g., "Onboarding", "Trading", "Account", "Settings"). Each item navigates to that screen inside the mobile frame. Closes on X click, backdrop click, or Escape.
- Center stage: an iPhone 16 frame, 393 × 852, with subtle device chrome (rounded bezel, Dynamic Island top center, home indicator bottom). The frame is RATIO-LOCKED at 393:852 and scales proportionally with the viewport — on a desktop it shows large, on a phone it shrinks while preserving the exact aspect ratio. Never letterbox, never stretch, never crop.
- Top label above the frame: small uppercase device descriptor (e.g., "iPhone 16 · 393 × 852").
- Bottom label under the frame: page name and short subtitle.
- Inside the frame: the actual mobile screen renders here. Vertically scrollable, scrollbar hidden. Background of the screen is pure #000000.
- Outside the frame: nothing else competes for attention — no toolbars, no instructions, no decoration. The frame is the focus.

The shell, the drawer, and the frame chrome use the same Inter font and the same color palette as the screens inside. Treat the shell as part of the design system, not a wrapper around it.

OUTPUT
- Mobile target: iPhone 16, 393 × 852.
- Always wrap your prototype in the prototype container above. Single-screen mockups are not acceptable — every prototype has at minimum a hamburger drawer with the sitemap.
- Avoid persuasion, urgency, gamification, and behavioral nudging.
- Assume user competence. The interface presents reality and records decisions.

When you produce a screen, justify every CTA choice against the Decision/Navigational/Finalization rule.`;

Tokens:
- Colors: black, #1C1C1C, #232627, #565B5E, #929292, #A7A7A7, #C7C7C7, #E3E2E2, #FFFFFF.
- Spacing (4px base): 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80.

Layout: every screen is flex-column with top bar (88px) → body (flex: 1) → bottom zone (sticky to bottom edge). ALL CTAs live in the bottom zone — never mid-content. Stacking order at the bottom: navigational CTAs first, then LPB at the very bottom edge. If a keypad is present, it sits below the CTAs at the absolute bottom (no LPB on those screens).

CTA rule: only Large Primary Button is filled, and only for finalization (post-execution closure). LPB dimensions: 393 × 99 (full screen width edge-to-edge, no horizontal padding, 99px tall). Background #1C1C1C, text centered, no border/shadow/radius. Position: always at the very bottom edge. All other CTAs are text + arrow with no fill. Cancel is always text-only.

Modals: surface #1C1C1C, full screen width (edge-to-edge, no horizontal margin), 20px internal padding, X close top-right, H2 title, body in #929292. Three patterns: info-only (no action), info + LPB (LPB inside modal uses #232627 — one step lighter than the modal surface), decision (radios + bottom-right arrow CTA, X serves as Cancel).

Scrollbars are never visible on mobile screens — hide them in CSS (scrollbar-width: none; ::-webkit-scrollbar { display: none; }).

Prototype shell (mandatory wrapper): dark #0A0A0A background, top-left hamburger that opens a left-drawer with the sitemap of every screen, centered iPhone 16 frame (393×852, ratio-locked, responsive), small device label above and page title below the frame. Never produce loose mobile screens — always wrap in this shell.

Discipline-first: no urgency, no nudging, no decoration. Calm and procedural.`;
    }

    function generateCopyPrompt() {
      return `Review or rewrite the following copy through the Mogo Intelligent Investing language rules.

CORE RULE
${TOKENS.copyPrinciples.coreRule}

NAMING
- Past events (already happened): use "Submitted at, Executed at, Expired at, Cancelled at" — never the bare word.
- Future condition (has not happened yet): use "Expires" only — never "Expires at" or "Expiration".

PRICE TERMINOLOGY
- Intent (user input): Limit Price, Stop Price.
- Outcome (after execution): Price, Total Cost (Buy), Total Proceeds (Sell).
- Never mix intent and outcome.

VOICE
Neutral, precise, minimal. No persuasion, no reassurance, no encouragement. The product presents reality and records decisions; it does not guide users toward action.

[PASTE COPY TO REVIEW BELOW]`;
    }

    /* =========================================================
       ROUTING & INIT
       ========================================================= */
    let currentPageId = null;

    function navigate(id) {
      const page = PAGES.find(p => p.id === id);
      if (!page) return;
      currentPageId = id;
      const stage = document.getElementById('stage');
      stage.setAttribute('data-mode', page.mode);
      if (page.mode === 'frame') {
        const screen = document.getElementById('screen');
        page.render(screen);
        document.getElementById('frame-page-title').innerHTML = `<span>${page.label}</span>${page.subtitle ? '<small>' + page.subtitle + '</small>' : ''}`;
      } else {
        const docs = document.getElementById('docs');
        page.render(docs);
      }
      document.getElementById('page-meta').textContent = page.group + ' · ' + page.label;
      document.querySelectorAll('.drawer-item').forEach(it => {
        it.classList.toggle('active', it.dataset.id === id);
      });
      closeDrawer();
    }

    function buildDrawer() {
      const list = document.getElementById('drawer-list');
      list.innerHTML = '';
      const groups = {};
      PAGES.forEach(p => { (groups[p.group] = groups[p.group] || []).push(p); });
      const order = ['Design', 'Components', 'Code & Tools'];
      order.forEach(g => {
        if (!groups[g]) return;
        list.appendChild(el('div', { class: 'drawer-group-label' }, g));
        groups[g].forEach(p => {
          const item = el('button', { class: 'drawer-item', 'data-id': p.id }, [
            el('span', {}, p.label),
            el('span', { class: 'arrow' }, '→')
          ]);
          item.addEventListener('click', () => navigate(p.id));
          list.appendChild(item);
        });
      });
    }

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-backdrop').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-backdrop').classList.remove('open');
    }

    /* Responsive frame scaling — reserves space for top label and bottom page title */
    function updateScale() {
      const stage = document.querySelector('.stage-frame');
      if (!stage) return;
      // Reserved vertical space: top label (~24) + gap (14) + gap (14) + page title (~52, two lines) + paddingTop (24) + paddingBottom (32)
      const reservedH = 24 + 14 + 14 + 52 + 24 + 32; // ≈ 160
      const reservedW = 48; // side padding
      const availW = stage.clientWidth - reservedW;
      const availH = stage.clientHeight - reservedH;
      const scale = Math.min(availW / 393, availH / 852, 1);
      document.documentElement.style.setProperty('--device-scale', Math.max(scale, 0.3));
    }

    /* Init */
    document.addEventListener('DOMContentLoaded', () => {
      buildDrawer();
      navigate('welcome');
      updateScale();
      document.getElementById('hamburger').addEventListener('click', openDrawer);
      document.getElementById('drawer-close').addEventListener('click', closeDrawer);
      document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
      window.addEventListener('resize', updateScale);
      window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });
    });
  </script>
</body>
